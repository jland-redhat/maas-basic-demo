# LLMInferenceServiceConfig for llm-d-inference-sim (simulator). Installed with the free MaaS + simulator stack.
# Namespace matches typical RHOAI / Open Data Hub KServe config placement.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceServiceConfig
metadata:
  name: simulator-kserve-config-llm-decode-template
  namespace: opendatahub
  labels:
    app.kubernetes.io/part-of: kserve
    app.opendatahub.io/kserve: "true"
    opendatahub.io/config-type: accelerator
    platform.opendatahub.io/part-of: kserve
  annotations:
    serving.kserve.io/well-known-config: "true"
    openshift.io/description: Simulator LLMInferenceServiceConfig.
    openshift.io/display-name: LLMInferenceServiceConfig used for simulations of llm-d-inference-sim.
    opendatahub.io/recommended-accelerators: '["ibm.com/spyre_vf"]'
spec:
  model:
    uri: ""
  template:
    containers:
      - resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
            scheme: HTTPS
        terminationMessagePath: /dev/termination-log
        name: main
        command:
          - /app/llm-d-inference-sim
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        ports:
          - containerPort: 8000
            name: https
            protocol: TCP
        imagePullPolicy: Always
        volumeMounts:
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
        terminationMessagePolicy: FallbackToLogsOnError
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.7.1
        args:
          - "--port"
          - "8000"
          - "--model"
          - "${SIM_MODEL:-facebook/opt-125m}"
          - "--mode"
          - random
          - "--ssl-certfile"
          - /var/run/kserve/tls/tls.crt
          - "--ssl-keyfile"
          - /var/run/kserve/tls/tls.key
    terminationGracePeriodSeconds: 30
    volumes:
      - name: tls-certs
        secret:
          secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
