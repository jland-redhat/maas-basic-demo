# Shared template for llm-d-inference-sim (MaaS demo). Referenced by free/premium simulator LLMInferenceServices via spec.baseRefs.
# Namespace matches typical RHOAI / Open Data Hub KServe config placement.
#
# Model id for the simulator process: the binary reads `--model` (see args below), not an env var.
# To change it per deployment, override `spec.template.containers[0].args` on the LLMInferenceService
# and keep `spec.model.name` consistent with what you advertise to MaaS.
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceServiceConfig
metadata:
  name: maas-demo-simulator-template
  namespace: opendatahub
  labels:
    app.kubernetes.io/part-of: kserve
    app.opendatahub.io/kserve: "true"
    opendatahub.io/config-type: accelerator
    platform.opendatahub.io/part-of: kserve
  annotations:
    serving.kserve.io/well-known-config: "true"
    openshift.io/description: MaaS demo — llm-d-inference-sim workload template.
    openshift.io/display-name: MaaS demo simulator (llm-d-inference-sim)
    opendatahub.io/recommended-accelerators: '["ibm.com/spyre_vf"]'
spec:
  model:
    uri: ""
  template:
    containers:
      - resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
            scheme: HTTPS
        terminationMessagePath: /dev/termination-log
        name: main
        command:
          - /app/llm-d-inference-sim
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        ports:
          - containerPort: 8000
            name: https
            protocol: TCP
        imagePullPolicy: Always
        volumeMounts:
          - mountPath: /var/run/kserve/tls
            name: tls-certs
            readOnly: true
        terminationMessagePolicy: FallbackToLogsOnError
        image: quay.io/maas/llm-d-inference-sim:latest
        args:
          - "--port"
          - "8000"
          - "--model"
          - "facebook/opt-125m"
          - "--mode"
          - random
          - "--ssl-certfile"
          - /var/run/kserve/tls/tls.crt
          - "--ssl-keyfile"
          - /var/run/kserve/tls/tls.key
    terminationGracePeriodSeconds: 30
    volumes:
      - name: tls-certs
        secret:
          secretName: '{{ ChildName .ObjectMeta.Name `-kserve-self-signed-certs` }}'
