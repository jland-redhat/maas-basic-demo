# Build validation notebooks to static HTML and publish to GitHub Pages (no execution).
#
# After the first run: Repository → Settings → Pages → set "Source" to
# "GitHub Actions" (not "Deploy from a branch").

name: Deploy notebook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nbconvert
        run: pip install nbconvert

      - name: Convert notebooks to HTML
        run: |
          mkdir -p _site
          python -m nbconvert --to html \
            --output-dir _site \
            --output index \
            BasicDemo.ipynb
          python -m nbconvert --to html \
            --output-dir _site \
            --output basic-demo-no-key \
            BasicDemo-no-key.ipynb
          python -m nbconvert --to html \
            --output-dir _site \
            --output external-models-demo \
            ExternalModelsDemo.ipynb

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
