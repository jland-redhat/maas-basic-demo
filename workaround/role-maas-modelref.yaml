# Allows create/get/update/delete of MaaSModelRef in namespace llm (deploy model wizard).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: maas-modelref-editor
rules:
  - apiGroups:
      - maas.opendatahub.io
    resources:
      - maasmodelrefs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
